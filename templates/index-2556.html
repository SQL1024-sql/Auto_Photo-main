<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造型製圖工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #1a1a1a; color: #e0e0e0; font-size: 14px; padding-bottom: 50px; }

/* Header */
.app-header {
    background: #111;
    border-bottom: 2px solid #333;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.app-header .brand { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
.app-header .version { font-size: 11px; color: #555; background: #222; padding: 2px 8px; border-radius: 10px; border: 1px solid #333; }

/* Step progress bar */
.steps {
    display: flex;
    align-items: center;
    padding: 10px 24px;
    background: #161616;
    border-bottom: 1px solid #2a2a2a;
    gap: 0;
    overflow-x: auto;
}
.step {
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    color: #555;
    font-size: 12px;
    font-weight: 500;
    transition: color 0.3s;
}
.step.active { color: #42a5f5; }
.step.done   { color: #4caf50; }
.step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #444;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
}
.step.active .step-num { border-color: #42a5f5; background: #1565c0; color: #fff; }
.step.done   .step-num { border-color: #4caf50; background: #2e7d32; color: #fff; }
.step-arrow { color: #333; margin: 0 10px; font-size: 16px; user-select: none; }

/* Panels */
.panel { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; }
.panel-title { color: #777; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
input[type=file], input[type=number] { color: #ccc; background: #222; border: 1px solid #3a3a3a; padding: 4px 8px; font-family: 'Noto Sans TC', sans-serif; }
button { background: #252525; color: #bbb; border: 1px solid #3a3a3a; padding: 6px 12px; cursor: pointer; transition: 0.2s; border-radius: 4px; font-family: 'Noto Sans TC', sans-serif; }
button:hover { background: #333; color: #fff; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.ok         { border-color: #2e7d32; color: #4caf50; }
.blue-btn   { border-color: #1976d2; color: #42a5f5; }
.orange-btn { border-color: #e65100; color: #ff9800; }

/* Canvas */
#canvas-wrap { position: relative; display: inline-block; margin-top: 10px; background: #000; width: 100%; overflow: hidden; }
canvas { border: 1px solid #333; display: block; cursor: ns-resize; width: 100%; height: auto; touch-action: none; image-rendering: -webkit-optimize-contrast; }

/* Bank */
.bank {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    background: #111;
    padding: 10px;
    border: 1px solid #222;
    margin: 8px 0;
    max-height: 400px;
    overflow-y: auto;
}
.bank img {
    width: 100%;
    aspect-ratio: 302 / 552;
    object-fit: cover;
    cursor: grab;
    border: 1px solid #333;
    background: #222;
    transition: transform 0.1s, opacity 0.2s;
    user-select: none;
}
.bank img:hover { transform: scale(1.06); border-color: #666; }
.bank img.used {
    opacity: 0.28;
    border: 1px solid #444;
    cursor: not-allowed;
    filter: grayscale(60%);
}
.bank-info { font-size: 12px; color: #666; margin-bottom: 4px; }

@media (max-width: 1400px) { .bank { grid-template-columns: repeat(8, 1fr); } }
@media (max-width: 900px)  { .bank { grid-template-columns: repeat(5, 1fr); } }
@media (max-width: 600px)  { .bank { grid-template-columns: repeat(4, 1fr); } }

/* Grid */
.grid-container { display: grid; padding: 10px; gap: 8px; width: fit-content; background: #111; border: 1px solid #333; }
.cell {
    width: 80px; height: 146px; background: #222; border: 1px dashed #444;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; cursor: pointer;
}
.cell img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; }

#result-area { display: none; text-align: center; padding: 30px 10px; }
#result-img { max-width: 100%; border: 1px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.8); }

/* Toast */
.toast {
    position: fixed;
    bottom: 24px; right: 24px;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    transition: opacity 0.3s;
    max-width: 320px;
    word-break: break-word;
    pointer-events: none;
}
.toast.ok   { background: #1b5e20; color: #a5d6a7; border-left: 4px solid #4caf50; }
.toast.err  { background: #b71c1c; color: #ffcdd2; border-left: 4px solid #ef5350; }
.toast.info { background: #0d47a1; color: #bbdefb; border-left: 4px solid #42a5f5; }
.toast.warn { background: #bf360c; color: #ffe0b2; border-left: 4px solid #ff9800; }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <span class="brand">造型製圖工具</span>
  <span class="version">v2556</span>
</header>

<!-- Step progress bar -->
<nav class="steps">
  <div class="step active" id="step-1"><div class="step-num">1</div>封面上傳</div>
  <span class="step-arrow">›</span>
  <div class="step" id="step-2"><div class="step-num">2</div>載入條圖</div>
  <span class="step-arrow">›</span>
  <div class="step" id="step-3"><div class="step-num">3</div>切割過濾</div>
  <span class="step-arrow">›</span>
  <div class="step" id="step-4"><div class="step-num">4</div>排版配置</div>
  <span class="step-arrow">›</span>
  <div class="step" id="step-5"><div class="step-num">5</div>輸出圖片</div>
</nav>

<!-- 0. 專案紀錄 -->
<div class="panel">
  <div class="panel-title">0. 專案紀錄 — 匯入 / 匯出</div>
  <div class="row">
    <button class="orange-btn" onclick="exportProject()">匯出專案紀錄 (.json)</button>
    <button class="orange-btn" onclick="document.getElementById('import-input').click()">匯入專案紀錄</button>
    <input type="file" id="import-input" style="display:none" accept=".json" onchange="importProject(this)">
  </div>
</div>

<!-- 1. 封面 -->
<div class="panel">
  <div class="panel-title">1. 封面圖片上傳（選填）</div>
  <div class="row">
    <input type="file" id="cover-input" accept="image/*" onchange="uploadCover(this)">
    <span id="cover-status" style="color:#666">尚未上傳</span>
  </div>
</div>

<!-- 2. 條圖切割 -->
<div class="panel">
  <div class="panel-title">2. 載入條圖並切割（支援觸控滑動）</div>
  <div class="row">
    <input type="file" id="strip-input" multiple accept="image/*">
    <button onclick="changeImg(-1)">上一張</button>
    <span id="nav-info" style="color:#aaa;">0 / 0</span>
    <button onclick="changeImg(1)">下一張</button>
    <button class="ok" id="cut-btn" onclick="cutAll()">開始切割並過濾</button>
  </div>
  <div class="row" style="border-top:1px solid #2a2a2a; padding-top:8px; margin-top:4px;">
    <span style="color:#777; font-size:11px;">錨點自動定位：</span>
    Y偏移 <input type="number" id="y-offset" value="-481" style="width:70px" title="錨點頂部 + 此值 = y_top，正數往下、負數往上">
    <button class="blue-btn" id="detect-btn" onclick="autoDetectY()">⊙ 自動定位全部</button>
    <span id="detect-status" style="color:#aaa"></span>
  </div>
  <div id="canvas-wrap" style="display:none;"><canvas id="c"></canvas></div>
</div>

<!-- 3 & 4. 資源庫 + 排版 -->
<div class="panel">
  <div class="panel-title">3. 造型資源庫</div>
  <div class="bank-info" id="bank-info">尚無造型，請先切割條圖</div>
  <div class="bank" id="bank"></div>

  <div class="panel-title" style="margin-top:20px;">4. 排版設定</div>
  <div class="row">
    列 <input type="number" id="rows" value="2" style="width:50px">
    欄 <input type="number" id="cols" value="5" style="width:50px">
    <button onclick="initGrid()">重建表格</button>
    <button class="blue-btn" onclick="autoFill()">自動填滿</button>
    <button class="ok" id="generate-btn" onclick="generate()">生成圖片</button>
  </div>
  <div id="grid-wrap" style="margin-top:10px;"></div>
</div>

<!-- 5. 結果 -->
<div class="panel" id="result-area">
  <div class="panel-title">最終結果</div>
  <div style="margin-bottom:12px;">
    <button class="ok" onclick="downloadResult()">下載圖片</button>
  </div>
  <img id="result-img">
</div>

<script>
let images = [], cur = 0, cells = [], allPieces = [], dragSrc = null, coverFile = null;
const FIXED_H = 551;
const BOXES_X = [[639, 940], [958, 1261], [1280, 1581], [1600, 1901], [1921, 2223]];
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');

// ──────────────────────────────────────────────────
// Toast 通知
// ──────────────────────────────────────────────────
let _toastEl = null, _toastTimer = null;
function showToast(msg, type = 'info') {
    if (!_toastEl) { _toastEl = document.createElement('div'); document.body.appendChild(_toastEl); }
    _toastEl.className = `toast ${type}`;
    _toastEl.innerText = msg;
    _toastEl.style.opacity = '1';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => {
        _toastEl.style.opacity = '0';
    }, 3000);
}

// ──────────────────────────────────────────────────
// 步驟進度
// ──────────────────────────────────────────────────
function setStepDone(n) {
    const el = document.getElementById(`step-${n}`);
    if (!el || el.classList.contains('done')) return;
    el.classList.remove('active');
    el.classList.add('done');
    el.querySelector('.step-num').innerText = '✓';
    const next = document.getElementById(`step-${n + 1}`);
    if (next && !next.classList.contains('done')) next.classList.add('active');
}

// ──────────────────────────────────────────────────
// 1. 核心畫布操作 (支援手機滑動)
// ──────────────────────────────────────────────────
function updateY(clientY) {
    if (!images[cur]) return;
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.height / rect.height;
    const ny = (clientY - rect.top) * scale - (FIXED_H / 2);
    images[cur].y = Math.max(0, Math.min(ny, images[cur].img.height - FIXED_H));
    draw();
}

canvas.onmousedown = (e) => {
    updateY(e.clientY);
    window.onmousemove = (m) => updateY(m.clientY);
    window.onmouseup = () => window.onmousemove = null;
};

canvas.addEventListener('touchstart', (e) => {
    if (e.target === canvas) e.preventDefault();
    updateY(e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    if (e.target === canvas) e.preventDefault();
    updateY(e.touches[0].clientY);
}, { passive: false });

function draw() {
    const e = images[cur], yt = e.y, yb = yt + FIXED_H;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(e.img, 0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, yt);
    ctx.fillRect(0, yb, canvas.width, canvas.height - yb);
    ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 5;
    BOXES_X.forEach(b => ctx.strokeRect(b[0], yt, b[1] - b[0], FIXED_H));
    const label = `y_top = ${yt}`;
    ctx.font = 'bold 36px monospace';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(8, 8, ctx.measureText(label).width + 16, 50);
    ctx.fillStyle = '#00ff00';
    ctx.fillText(label, 16, 46);
}

// ──────────────────────────────────────────────────
// 2. 錨點上傳與自動定位
// ──────────────────────────────────────────────────
async function autoDetectY() {
    if (!images.length) { showToast('請先載入條圖', 'warn'); return; }
    const offset = parseInt(document.getElementById('y-offset').value) || 0;
    const btn = document.getElementById('detect-btn');
    const statusEl = document.getElementById('detect-status');
    btn.disabled = true;
    statusEl.innerText = '';

    let ok = 0, fail = 0;
    for (let i = 0; i < images.length; i++) {
        btn.innerText = `偵測中 ${i + 1} / ${images.length}...`;
        const fd = new FormData();
        fd.append('strip', images[i].f);
        fd.append('y_offset', offset);
        const res = await fetch('/detect_y', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.found) { images[i].y = data.y_top; ok++; } else { fail++; }
    }

    btn.disabled = false; btn.innerText = '⊙ 自動定位全部';
    statusEl.style.color = fail ? '#ff9800' : '#4caf50';
    statusEl.innerText = `${ok} 成功 / ${fail} 失敗`;
    if (images[cur]) showImg(cur);

    if (fail === 0) showToast(`自動定位完成，共 ${ok} 張成功`, 'ok');
    else showToast(`定位完成：${ok} 成功，${fail} 張未找到錨點`, 'warn');
}

// ──────────────────────────────────────────────────
// 3. 檔案上傳與切割
// ──────────────────────────────────────────────────
async function uploadCover(input) {
    if (!input.files[0]) return;
    const fd = new FormData(); fd.append('cover', input.files[0]);
    const res = await fetch('/upload_cover', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.filename) {
        coverFile = data.filename;
        document.getElementById('cover-status').innerText = '✓ 已就緒';
        document.getElementById('cover-status').style.color = '#4caf50';
        showToast('封面已上傳', 'ok');
        setStepDone(1);
    } else {
        showToast(data.error || '封面上傳失敗', 'err');
    }
}

document.getElementById('strip-input').onchange = function(e) {
    images = []; let loaded = 0;
    const files = Array.from(e.target.files);
    if (!files.length) return;
    files.forEach((f, i) => {
        const img = new Image();
        img.onload = () => {
            images[i] = { f, img, y: Math.round(img.height * 0.4) };
            if (++loaded === files.length) {
                document.getElementById('canvas-wrap').style.display = 'block';
                showImg(0);
                showToast(`已載入 ${files.length} 張條圖`, 'info');
                setStepDone(2);
            }
        };
        img.src = URL.createObjectURL(f);
    });
};

function showImg(idx) {
    cur = idx; const e = images[idx];
    canvas.width = e.img.width; canvas.height = e.img.height;
    document.getElementById('nav-info').innerText = `${idx + 1} / ${images.length}`;
    draw();
}

async function cutAll() {
    if (!images.length) { showToast('請先載入條圖', 'warn'); return; }
    const btn = document.getElementById('cut-btn');
    btn.disabled = true;
    let newCount = 0;

    for (let i = 0; i < images.length; i++) {
        btn.innerText = `切割中 ${i + 1} / ${images.length}...`;
        const fd = new FormData();
        fd.append('strip', images[i].f);
        fd.append('y_top', Math.round(images[i].y));
        const res = await fetch('/upload_strip', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.pieces) {
            data.pieces.forEach(p => { if (!allPieces.includes(p)) { allPieces.push(p); newCount++; } });
        }
    }

    btn.disabled = false; btn.innerText = '開始切割並過濾';
    renderAll();
    showToast(`切割完成，新增 ${newCount} 個造型，共 ${allPieces.length} 個`, 'ok');
    setStepDone(3);
    setStepDone(4);
}

// ──────────────────────────────────────────────────
// 4. 格位與自動填滿
// ──────────────────────────────────────────────────
function initGrid() {
    const r = parseInt(document.getElementById('rows').value);
    const c = parseInt(document.getElementById('cols').value);
    const targetCount = r * c;
    if (cells.length > targetCount) cells = cells.slice(0, targetCount);
    else while (cells.length < targetCount) cells.push(null);
    renderAll();
}

function renderAll() {
    const r = parseInt(document.getElementById('rows').value), c = parseInt(document.getElementById('cols').value);
    const wrap = document.getElementById('grid-wrap');
    wrap.innerHTML = `<div class="grid-container" style="grid-template-columns:repeat(${c}, 80px)"></div>`;
    const container = wrap.firstChild;

    for (let i = 0; i < cells.length; i++) {
        const div = document.createElement('div');
        div.className = 'cell'; div.dataset.index = i;
        div.innerHTML = cells[i] ? `<img src="/image/${cells[i]}">` : '';
        div.onclick = () => { if (cells[i]) { cells.splice(i, 1); cells.push(null); renderAll(); } };
        div.ondragover = (e) => e.preventDefault();
        div.ondrop = (e) => { e.preventDefault(); addToCell(e.dataTransfer.getData('text'), i); };
        div.draggable = true;
        div.ondragstart = (e) => { if (!cells[i]) return e.preventDefault(); dragSrc = { type: 'cell', idx: i }; e.dataTransfer.setData('text', cells[i]); };
        container.appendChild(div);
    }

    const bank = document.getElementById('bank');
    const bankInfo = document.getElementById('bank-info');
    bank.innerHTML = '';

    const usedCount = cells.filter(x => x !== null).length;
    const sortedBank = [...allPieces].sort().reverse();

    bankInfo.innerText = allPieces.length
        ? `共 ${allPieces.length} 個造型　已使用 ${usedCount} 個　剩餘 ${allPieces.length - usedCount} 個`
        : '尚無造型，請先切割條圖';

    sortedBank.forEach(fn => {
        const img = document.createElement('img');
        img.src = `/image/${fn}`;
        const isUsed = cells.includes(fn);
        img.className = isUsed ? 'used' : '';
        img.title = isUsed ? '已在排版中' : '點擊或拖曳加入排版';
        img.onclick = () => {
            if (isUsed) return;
            const emptyIdx = cells.indexOf(null);
            if (emptyIdx !== -1) { cells[emptyIdx] = fn; renderAll(); }
            else showToast('格位已滿，請增加列數或欄數', 'warn');
        };
        img.draggable = true;
        img.ondragstart = (e) => { dragSrc = { type: 'bank' }; e.dataTransfer.setData('text', fn); };
        bank.appendChild(img);
    });
}

function addToCell(fn, targetIdx) {
    const totalSize = cells.length;
    if (dragSrc && dragSrc.type === 'bank') {
        cells.splice(targetIdx, 0, fn);
        cells = cells.slice(0, totalSize);
    } else if (dragSrc && dragSrc.type === 'cell') {
        const item = cells.splice(dragSrc.idx, 1)[0];
        cells.splice(targetIdx, 0, item);
        if (cells.length < totalSize) cells.push(null);
    }
    renderAll();
}

function autoFill() {
    const sortedList = [...allPieces].sort().reverse();
    const currentUsed = cells.filter(c => c !== null);
    const available = sortedList.filter(fn => !currentUsed.includes(fn));
    let aIdx = 0;
    for (let i = 0; i < cells.length; i++) {
        if (!cells[i] && aIdx < available.length) cells[i] = available[aIdx++];
    }
    renderAll();
    showToast('已自動填入可用造型', 'info');
}

// ──────────────────────────────────────────────────
// 5. 生成與專案紀錄
// ──────────────────────────────────────────────────
async function generate() {
    const btn = document.getElementById('generate-btn');
    btn.disabled = true; btn.innerText = '生成中...';
    showToast('正在生成圖片，請稍候...', 'info');
    const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            cover: coverFile, cells: cells,
            grid_rows: document.getElementById('rows').value,
            grid_cols: document.getElementById('cols').value
        })
    });
    const data = await res.json();
    btn.disabled = false; btn.innerText = '生成圖片';
    if (data.preview) {
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-img').src = 'data:image/jpeg;base64,' + data.preview;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        showToast('圖片生成完成！', 'ok');
        setStepDone(5);
    } else {
        showToast('生成失敗，請確認排版中有放入造型', 'err');
    }
}

function exportProject() {
    const data = {
        coverFile, allPieces, cells,
        rows: document.getElementById('rows').value,
        cols: document.getElementById('cols').value
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `project_${Date.now()}.json`;
    a.click();
    showToast('專案紀錄已匯出', 'ok');
}

function importProject(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            coverFile = data.coverFile;
            allPieces = data.allPieces || [];
            cells = data.cells || [];
            document.getElementById('rows').value = data.rows;
            document.getElementById('cols').value = data.cols;
            renderAll();
            showToast('專案紀錄已匯入', 'ok');
        } catch {
            showToast('匯入失敗，檔案格式錯誤', 'err');
        }
    };
    reader.readAsText(input.files[0]);
}

function downloadResult() {
    const img = document.getElementById('result-img');
    if (!img.src || img.src === window.location.href) { showToast('尚無圖片可下載', 'warn'); return; }
    const a = document.createElement('a');
    a.href = img.src;
    a.download = `result_${Date.now()}.jpg`;
    a.click();
}

function changeImg(s) { cur = (cur + s + images.length) % images.length; showImg(cur); }
initGrid();
</script>
