<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造型製圖工具</title>
<style>
    * { box-sizing: border-box; }
    body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 10px; }
    .panel { padding: 15px; border-bottom: 1px solid #333; margin-bottom: 10px; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    button { background: #333; color: #fff; border: 1px solid #555; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
    button.ok { border-color: #2e7d32; color: #4caf50; font-weight: bold; }
    canvas { border: 1px solid #444; background: #000; max-width: 100%; display: block; margin: 10px 0; }
    .bank { display: flex; flex-wrap: wrap; gap: 5px; min-height: 80px; background: #111; padding: 10px; border: 1px solid #222; }
    .bank img { width: 60px; height: 100px; object-fit: cover; border: 1px solid #444; }
    .bank img.used { opacity: 0.3; }
    .grid-container { display: grid; gap: 5px; background: #111; padding: 10px; width: fit-content; }
    .cell { width: 80px; height: 130px; background: #222; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .cell img { width: 100%; height: 100%; object-fit: fill; }
    #result-area { display: none; text-align: center; margin-top: 20px; }
    #result-img { max-width: 100%; border: 2px solid #555; }
</style>
</head>
<body>

<div class="panel">
    <div>1. COVER 封面</div>
    <input type="file" id="cover-input">
</div>

<div class="panel">
    <div>2. STRIP 造型切割</div>
    <div class="row">
        <input type="file" id="strip-input" multiple>
        <button id="btn-cut" class="ok">✂ 開始切割全部</button>
    </div>
    <canvas id="c" style="display:none;"></canvas>
</div>

<div class="panel">
    <div>3. GRID 排版</div>
    <div id="bank" class="bank"></div>
    <div class="row">
        ROWS <input type="number" id="rows" value="2" style="width:50px">
        COLS <input type="number" id="cols" value="5" style="width:50px">
        <button id="btn-reset">重新表格</button>
        <button id="btn-gen" class="ok">✨ 生成長圖</button>
    </div>
    <div id="grid-wrap"></div>
</div>

<div id="result-area">
    <div>FINAL RESULT</div>
    <img id="result-img">
</div>

<script>
const BOX_X = [[510, 753], [767, 1009], [1025, 1265], [1281, 1524], [1538, 1781]];
const FIXED_H = 437;
let images = [], allPieces = [], cells = [], coverFile = null;

const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');

window.onload = () => {
    initGrid();
    document.getElementById('cover-input').onchange = uploadCover;
    document.getElementById('strip-input').onchange = loadStrips;
    document.getElementById('btn-cut').onclick = cutAll;
    document.getElementById('btn-reset').onclick = initGrid;
    document.getElementById('btn-gen').onclick = generate;
};

async function uploadCover(e) {
    const fd = new FormData(); fd.append('cover', e.target.files[0]);
    const res = await fetch('/upload_cover', {method:'POST', body:fd});
    const data = await res.json();
    coverFile = data.filename;
}

function loadStrips(e) {
    images = Array.from(e.target.files).map(f => ({ f, y: 400 }));
    canvas.style.display = 'block';
    // 預覽第一張
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
            const sc = Math.min(window.innerWidth / img.width, 1);
            canvas.width = img.width * sc; canvas.height = img.height * sc;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
}

async function cutAll() {
    allPieces = [];
    const btn = document.getElementById('btn-cut');
    btn.innerText = "切割中...";
    for(let imgObj of images) {
        const fd = new FormData();
        fd.append('strip', imgObj.f);
        fd.append('y_top', imgObj.y);
        const res = await fetch('/upload_strip', {method:'POST', body:fd});
        const data = await res.json();
        allPieces.push(...data.pieces);
    }
    btn.innerText = "✂ 切割完成";
    renderAll();
}

function initGrid() {
    const r = document.getElementById('rows').value, c = document.getElementById('cols').value;
    cells = new Array(r * c).fill(null);
    renderAll();
}

function renderAll() {
    const c = document.getElementById('cols').value;
    const wrap = document.getElementById('grid-wrap');
    wrap.innerHTML = `<div class="grid-container" style="grid-template-columns:repeat(${c}, 80px)"></div>`;
    const container = wrap.firstChild;

    cells.forEach((fn, i) => {
        const div = document.createElement('div'); div.className = 'cell';
        div.innerHTML = fn ? `<img src="/image/${fn}">` : '';
        div.onclick = () => { cells[i] = null; renderAll(); };
        container.appendChild(div);
    });

    const bank = document.getElementById('bank'); bank.innerHTML = '';
    allPieces.forEach(fn => {
        const img = document.createElement('img'); img.src = `/image/${fn}`;
        if(cells.includes(fn)) img.classList.add('used');
        img.onclick = () => {
            const idx = cells.indexOf(null);
            if(idx !== -1 && !cells.includes(fn)) { cells[idx] = fn; renderAll(); }
        };
        bank.appendChild(img);
    });
}

async function generate() {
    const res = await fetch('/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            cover: coverFile,
            cells: cells,
            grid_rows: document.getElementById('rows').value,
            grid_cols: document.getElementById('cols').value
        })
    });
    const data = await res.json();
    if(data.preview) {
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-img').src = 'data:image/jpeg;base64,' + data.preview;
    }
}
</script>
</body>
</html>
