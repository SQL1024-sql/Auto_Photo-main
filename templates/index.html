<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>造型製圖工具 - 完整強化版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#1a1a1a;color:#e0e0e0;padding-bottom:50px}
.panel{padding:14px;border-bottom:1px solid #2a2a2a}
.row{display:flex;gap:10px;flex-wrap:wrap}
button{background:#252525;color:#bbb;border:1px solid #3a3a3a;padding:6px 12px}
canvas{border:1px solid #333;touch-action:none}
.bank{display:flex;flex-wrap:wrap;gap:8px;padding:10px}
.bank img{width:65px;height:107px;border:1px solid #333}
.bank img.selected{outline:2px solid lime}
.grid{display:grid;gap:8px;padding:10px}
.cell{width:100px;height:165px;background:#222;border:1px dashed #444;display:flex;align-items:center;justify-content:center}
.cell img{width:100%;height:100%}
</style>
</head>
<body>

<div class="panel">
<input type="file" id="cover-input">
<input type="file" id="strip-input" multiple>
<button onclick="cutAll()">切割</button>
<button onclick="autoFill()">AUTO FILL</button>
<canvas id="c"></canvas>
</div>

<div class="panel">
<div id="bank" class="bank"></div>
<button onclick="initGrid()">建立格子</button>
<div id="grid-wrap"></div>
<button onclick="generate()">生成</button>
</div>

<img id="result" style="max-width:100%">

<script>
const BOXES_X=[[510,753],[767,1009],[1025,1265],[1281,1524],[1538,1781]];
const FIXED_H=437;

let images=[],cur=0,scale=0.5,allPieces=[],cells=[],selectedPiece=null,coverFile=null;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// cover
document.getElementById('cover-input').onchange=e=>{
 const f=e.target.files[0];
 const fd=new FormData();fd.append('cover',f);
 fetch('/upload_cover',{method:'POST',body:fd})
 .then(r=>r.json()).then(d=>coverFile=d.filename);
};

// load strips
document.getElementById('strip-input').onchange=e=>{
 images=[];
 Array.from(e.target.files).forEach((f,i)=>{
  const img=new Image();
  img.onload=()=>{
   images[i]={f,img,y:img.height*0.4};
   if(i===0)showImg(0);
  };
  img.src=URL.createObjectURL(f);
 });
};

function showImg(i){
 cur=i;
 const e=images[i];
 canvas.width=e.img.width*scale;
 canvas.height=e.img.height*scale;
 draw();
}

function draw(){
 const e=images[cur];
 ctx.drawImage(e.img,0,0,canvas.width,canvas.height);
 ctx.strokeStyle='lime';
 BOXES_X.forEach(b=>{
  ctx.strokeRect(b[0]*scale,e.y*scale,(b[1]-b[0])*scale,FIXED_H*scale);
 });
}

function updateY(clientY){
 const rect=canvas.getBoundingClientRect();
 let ny=(clientY-rect.top)/scale-(FIXED_H/2);
 images[cur].y=Math.max(0,Math.min(ny,images[cur].img.height-FIXED_H));
 draw();
}

canvas.onmousedown=e=>{updateY(e.clientY);window.onmousemove=m=>updateY(m.clientY);window.onmouseup=()=>window.onmousemove=null};
canvas.ontouchstart=e=>updateY(e.touches[0].clientY);
canvas.ontouchmove=e=>updateY(e.touches[0].clientY);

async function cutAll(){
 allPieces=[];
 for(let e of images){
  const fd=new FormData();
  fd.append('strip',e.f);
  fd.append('y_top',Math.round(e.y));
  const res=await fetch('/upload_strip',{method:'POST',body:fd});
  const d=await res.json();
  allPieces.push(...d.pieces);
 }
 renderBank();
}

function renderBank(){
 const bank=document.getElementById('bank');
 bank.innerHTML='';
 allPieces.forEach(fn=>{
  const img=document.createElement('img');
  img.src='/image/'+fn;
  if(fn===selectedPiece)img.classList.add('selected');
  img.onclick=()=>{selectedPiece=fn;renderBank();};
  bank.appendChild(img);
 });
}

function initGrid(){
 const rows=2,cols=5;
 cells=new Array(rows*cols).fill(null);
 const wrap=document.getElementById('grid-wrap');
 wrap.innerHTML='';
 const grid=document.createElement('div');
 grid.className='grid';
 grid.style.gridTemplateColumns=`repeat(${cols},100px)`;
 wrap.appendChild(grid);

 for(let i=0;i<cells.length;i++){
  const div=document.createElement('div');
  div.className='cell';

  div.onclick=()=>{
   if(selectedPiece){cells[i]=selectedPiece;selectedPiece=null}
   else cells[i]=null;
   renderGrid();renderBank();
  };

  // 手機拖曳（長按）
  let timer;
  div.ontouchstart=()=>{
   timer=setTimeout(()=>{selectedPiece=cells[i];cells[i]=null;renderGrid();},300);
  };
  div.ontouchend=()=>clearTimeout(timer);

  grid.appendChild(div);
 }
 renderGrid();
}

function renderGrid(){
 document.querySelectorAll('.cell').forEach((div,i)=>{
  div.innerHTML=cells[i]?`<img src="/image/${cells[i]}">`:'';
 });
}

function autoFill(){
 let idx=0;
 for(let i=0;i<cells.length;i++){
  if(!cells[i] && allPieces[idx]) cells[i]=allPieces[idx++];
 }
 renderGrid();
}

async function generate(){
 const res=await fetch('/generate',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({cover:coverFile,cells:cells,grid_rows:2,grid_cols:5})
 });
 const d=await res.json();
 document.getElementById('result').src='data:image/jpeg;base64,'+d.preview;
}
</script>
</body>
</html>
