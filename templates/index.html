<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>造型製圖工具 - 保留原版 + 手機裁切優化</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; font-size: 14px; padding-bottom: 50px; }
.panel { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; }
.panel-title { color: #777; font-size: 11px; margin-bottom: 10px; }
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
button { background: #252525; color: #bbb; border: 1px solid #3a3a3a; padding: 6px 12px; cursor: pointer; }

#canvas-wrap { position: relative; display: inline-block; margin-top: 10px; }
canvas { border: 1px solid #333; display: block; cursor: ns-resize; touch-action: none; }

.bank { display: flex; flex-wrap: wrap; gap: 8px; min-height: 100px; background: #111; padding: 10px; border: 1px solid #222; margin: 10px 0; }
.bank img { width: 65px; height: 107px; object-fit: cover; cursor: grab; border: 1px solid #333; background: #222; }
.bank img.used { opacity: 0.3; filter: grayscale(1); }

.grid-container { display: grid; gap: 8px; background: #111; padding: 15px; width: fit-content; border: 1px solid #333; }
.cell { width: 100px; height: 165px; background: #222; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; }
.cell img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
.cell.drag-over { border-color: #00ff00; background: #1b331b; }

#result-area { display: none; text-align: center; padding-top: 20px; }
#result-img { max-width: 100%; border: 1px solid #444; }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-title">STRIP / 裁切（已支援手機）</div>
  <div class="row">
    <input type="file" id="strip-input" multiple>
    <button onclick="changeImg(-1)">PREV</button>
    <span id="nav-info">0 / 0</span>
    <button onclick="changeImg(1)">NEXT</button>
  </div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>

<script>
const BOXES_X = [[510,753],[767,1009],[1025,1265],[1281,1524],[1538,1781]];
const FIXED_H = 437;

let images = [], cur = 0, scale = 1;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ⭐ 多張載入（保留原邏輯但修好）
document.getElementById('strip-input').onchange = function(e) {
    images = [];
    let loaded = 0;
    const files = Array.from(e.target.files);

    files.forEach((f, i) => {
        const img = new Image();
        img.onload = () => {
            images[i] = { f, img, y: Math.round(img.height * 0.4) };
            loaded++;
            if (loaded === files.length) {
                showImg(0);
            }
        };
        img.src = URL.createObjectURL(f);
    });
};

function showImg(idx) {
    cur = idx;
    const e = images[idx];
    scale = Math.min((window.innerWidth-50)/e.img.width, 400/e.img.height, 1);
    canvas.width = e.img.width * scale;
    canvas.height = e.img.height * scale;
    document.getElementById('nav-info').innerText = `${idx+1} / ${images.length}`;
    draw();
}

function draw() {
    const e = images[cur];
    const yt = e.y;
    const yb = yt + FIXED_H;

    ctx.drawImage(e.img, 0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, yt*scale);
    ctx.fillRect(0, yb*scale, canvas.width, canvas.height - yb*scale);

    ctx.strokeStyle = '#00ff00';
    ctx.lineWidth = 2;
    BOXES_X.forEach(b => ctx.strokeRect(b[0]*scale, yt*scale, (b[1]-b[0])*scale, FIXED_H*scale));
}

// ⭐ 核心優化：同時支援滑鼠 + 手機
function updateY(clientY) {
    const rect = canvas.getBoundingClientRect();
    let ny = (clientY - rect.top)/scale - (FIXED_H/2);
    images[cur].y = Math.max(0, Math.min(ny, images[cur].img.height - FIXED_H));
    draw();
}

// 拖曳調整裁切高度（滑鼠 + 觸控）
function setYFromClientY(clientY, rect) {
    let ny = (clientY - rect.top)/scale - (FIXED_H/2);
    images[cur].y = Math.max(0, Math.min(ny, images[cur].img.height - FIXED_H));
    draw();
}

// 滑鼠
canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const move = (m) => setYFromClientY(m.clientY, rect);
    move(e);
    window.onmousemove = move;
    window.onmouseup = () => window.onmousemove = null;
};

// 觸控（手機）
canvas.ontouchstart = (e) => {
    const rect = canvas.getBoundingClientRect();
    const move = (t) => setYFromClientY(t.touches[0].clientY, rect);
    move(e);
    window.ontouchmove = move;
    window.ontouchend = () => window.ontouchmove = null;
};

canvas.ontouchstart = (e) => {
    updateY(e.touches[0].clientY);
};

canvas.ontouchmove = (e) => {
    updateY(e.touches[0].clientY);
};

function changeImg(step) {
    if(images.length===0) return;
    cur = (cur + step + images.length) % images.length;
    showImg(cur);
}
</script>

</body>
</html>
