<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造型製圖工具 (Auto)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; font-size: 14px; padding-bottom: 50px; }
.panel { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; }
.panel-title { color: #777; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.row-sep { border-top: 1px solid #2a2a2a; padding-top: 8px; margin-top: 4px; }
input[type=file], input[type=number] { color: #ccc; background: #222; border: 1px solid #3a3a3a; padding: 4px 8px; font-family: monospace; }
button { background: #252525; color: #bbb; border: 1px solid #3a3a3a; padding: 6px 12px; cursor: pointer; transition: 0.2s; border-radius: 4px; }
button:hover { background: #333; color: #fff; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.ok  { border-color: #2e7d32; color: #4caf50; }
.blue-btn   { border-color: #1976d2; color: #42a5f5; }
.orange-btn { border-color: #e65100; color: #ff9800; }
.label { color: #777; font-size: 12px; white-space: nowrap; }

#canvas-wrap { position: relative; display: inline-block; margin-top: 10px; background: #000; width: 100%; overflow: hidden; }
canvas { border: 1px solid #333; display: block; cursor: ns-resize; width: 100%; height: auto; touch-action: none; image-rendering: -webkit-optimize-contrast; }

.bank {
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    gap: 4px;
    background: #111;
    padding: 10px;
    border: 1px solid #222;
    margin: 10px 0;
    max-height: 400px;
    overflow-y: auto;
}
.bank img {
    width: 100%;
    aspect-ratio: var(--bank-ratio, 302 / 552);
    object-fit: cover;
    cursor: grab;
    border: 1px solid #333;
    background: #222;
    transition: transform 0.1s;
    user-select: none;
}
.bank img.used { opacity: 0.35; }

@media (max-width: 1200px) { .bank { grid-template-columns: repeat(10, 1fr); } }
@media (max-width: 600px)  { .bank { grid-template-columns: repeat(5, 1fr); } }

.grid-container { display: grid; padding: 10px; gap: 8px; width: fit-content; background: #111; border: 1px solid #333; }
.cell {
    width: 80px; height: 146px; background: #222; border: 1px dashed #444;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; cursor: pointer;
}
.cell img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; }

#result-area { display: none; text-align: center; padding: 30px 10px; }
#result-img  { max-width: 100%; border: 1px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<!-- 0. PROJECT -->
<div class="panel">
  <div class="panel-title">0. PROJECT / 紀錄檔操作</div>
  <div class="row">
    <button class="orange-btn" onclick="exportProject()">匯出專案紀錄 (.json)</button>
    <button class="orange-btn" onclick="document.getElementById('import-input').click()">匯入專案紀錄</button>
    <input type="file" id="import-input" style="display:none" accept=".json" onchange="importProject(this)">
  </div>
</div>

<!-- 1. COVER -->
<div class="panel">
  <div class="panel-title">1. COVER / 封面</div>
  <div class="row">
    <input type="file" onchange="uploadCover(this)">
    <span id="cover-status" style="color:#666">尚未上傳</span>
  </div>
</div>

<!-- 2. STRIP -->
<div class="panel">
  <div class="panel-title">2. STRIP / 造型切割 (支援觸控滑動)</div>

  <div class="row">
    <input type="file" id="strip-input" multiple>
    <button onclick="changeImg(-1)">上一個</button>
    <span id="nav-info" style="color:#aaa;">0 / 0</span>
    <button onclick="changeImg(1)">下一個</button>
    <button class="ok" id="cut-btn" onclick="cutAll()">開始切割並過濾</button>
  </div>

  <!-- 框框調整 -->
  <div class="row row-sep">
    <span class="label">框框調整：</span>
    高度 <input type="number" id="box-h"  style="width:70px" oninput="draw()" title="裁切高度 (px)">
    X偏移 <input type="number" id="box-xoff" value="0" style="width:70px" oninput="draw()" title="所有框框水平位移 (px)">
    左右縮 <input type="number" id="box-trim" value="0" style="width:70px" oninput="draw()" title="從每個框框兩側各縮小的量 (px)，正數=縮、負數=擴">
    <button class="blue-btn" id="redetect-btn" onclick="redetect()">重新偵測</button>
    <span id="detect-result" style="color:#aaa"></span>
  </div>

  <div id="canvas-wrap" style="display:none;"><canvas id="c"></canvas></div>
</div>

<!-- 3. BANK / 4. GRID -->
<div class="panel">
  <div class="panel-title">3. BANK / 造型資源庫</div>
  <div class="bank" id="bank"></div>

  <div class="panel-title" style="margin-top:20px;">4. GRID / 排版</div>
  <div class="row">
    列 <input type="number" id="rows" value="2" style="width:50px">
    欄 <input type="number" id="cols" value="5" style="width:50px">
    <button onclick="initGrid()">重建表格</button>
    <button class="blue-btn" onclick="autoFill()">自動填滿</button>
    <button class="ok" id="generate-btn" onclick="generate()">生成圖片</button>
  </div>
  <div id="grid-wrap" style="margin-top:10px;"></div>
</div>

<div class="panel" id="result-area">
  <div class="panel-title">FINAL RESULT</div>
  <img id="result-img">
</div>

<script>
// ── 狀態 ──────────────────────────────────────────────
let images = [], cur = 0, cells = [], allPieces = [], dragSrc = null, coverFile = null;
let boxesX = [];   // 目前生效的框框 [[x1,x2], ...]
let fixedH = 552;  // 目前生效的高度

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── 框框計算 ─────────────────────────────────────────
function effectiveBoxes() {
    const trim = parseInt(document.getElementById('box-trim').value) || 0;
    const xoff = parseInt(document.getElementById('box-xoff').value) || 0;
    return boxesX.map(([x1, x2]) => [x1 + xoff + trim, x2 + xoff - trim]);
}

function effectiveH() {
    return Math.max(10, parseInt(document.getElementById('box-h').value) || fixedH);
}

function applyBankRatio() {
    if (!boxesX.length) return;
    const bw = boxesX[0][1] - boxesX[0][0];
    const eh = effectiveH();
    if (bw > 0 && eh > 0) {
        document.documentElement.style.setProperty('--bank-ratio', `${bw} / ${eh}`);
    }
}

// ── 畫布 ─────────────────────────────────────────────
function updateY(clientY) {
    if (!images[cur]) return;
    const rect  = canvas.getBoundingClientRect();
    const scale = canvas.height / rect.height;
    const eh    = effectiveH();
    const ny    = (clientY - rect.top) * scale - (eh / 2);
    images[cur].y = Math.max(0, Math.min(ny, images[cur].img.height - eh));
    draw();
}

canvas.onmousedown = (e) => {
    updateY(e.clientY);
    window.onmousemove = (m) => updateY(m.clientY);
    window.onmouseup  = ()  => window.onmousemove = null;
};

canvas.addEventListener('touchstart', (e) => {
    if (e.target === canvas) e.preventDefault();
    updateY(e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    if (e.target === canvas) e.preventDefault();
    updateY(e.touches[0].clientY);
}, { passive: false });

function draw() {
    if (!images[cur]) return;
    const e      = images[cur];
    const yt     = Math.round(e.y);
    const eh     = effectiveH();
    const yb     = yt + eh;
    const eboxes = effectiveBoxes();

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(e.img, 0, 0, canvas.width, canvas.height);

    // 上下遮罩
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, yt);
    ctx.fillRect(0, yb, canvas.width, canvas.height - yb);

    // 框框
    ctx.strokeStyle = '#00ff00';
    ctx.lineWidth   = 3;
    eboxes.forEach(([x1, x2]) => ctx.strokeRect(x1, yt, x2 - x1, eh));

    // 標籤
    const label = `y_top=${yt}  h=${eh}  ${eboxes.length}欄`;
    ctx.font = 'bold 32px monospace';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(8, 8, tw + 16, 46);
    ctx.fillStyle = '#00ff00';
    ctx.fillText(label, 16, 44);
}

// ── 自動偵測框框 ──────────────────────────────────────
async function redetect() {
    if (!images.length) { alert('請先載入條圖'); return; }
    document.getElementById('redetect-btn').disabled = true;
    document.getElementById('detect-result').innerText = '偵測中...';
    await detectBoxesFrom(images[0].f);
    document.getElementById('redetect-btn').disabled = false;
}

async function detectBoxesFrom(file) {
    const fd = new FormData();
    fd.append('strip', file);
    let data;
    try {
        const res = await fetch('/detect_boxes', { method: 'POST', body: fd });
        data = await res.json();
    } catch(e) {
        document.getElementById('detect-result').style.color = '#f44336';
        document.getElementById('detect-result').innerText = '偵測請求失敗';
        return;
    }

    boxesX = data.boxes_x;
    fixedH = data.fixed_height;

    document.getElementById('box-h').value    = fixedH;
    document.getElementById('box-xoff').value = 0;
    document.getElementById('box-trim').value = 0;

    const statusEl = document.getElementById('detect-result');
    if (data.detected) {
        statusEl.style.color = '#4caf50';
        statusEl.innerText   = `✓ 偵測到 ${boxesX.length} 欄，高度 ${fixedH}px`;
    } else {
        statusEl.style.color = '#ff9800';
        statusEl.innerText   = `⚠ 偵測失敗，使用預設值 (${boxesX.length} 欄)`;
    }

    // 若偵測到 y_top 就更新所有圖
    if (data.y_top) {
        images.forEach(img => { img.y = data.y_top; });
    }

    applyBankRatio();
    draw();
}

// ── 封面上傳 ──────────────────────────────────────────
async function uploadCover(input) {
    if (!input.files[0]) return;
    const fd = new FormData(); fd.append('cover', input.files[0]);
    const res = await fetch('/upload_cover', { method: 'POST', body: fd });
    const data = await res.json();
    coverFile = data.filename;
    document.getElementById('cover-status').innerText = '已就緒';
}

// ── Strip 載入 ────────────────────────────────────────
document.getElementById('strip-input').onchange = function(e) {
    images = []; let loaded = 0;
    const files = Array.from(e.target.files);
    files.forEach((f, i) => {
        const img = new Image();
        img.onload = async () => {
            images[i] = { f, img, y: Math.round(img.height * 0.4) };
            if (++loaded === files.length) {
                document.getElementById('canvas-wrap').style.display = 'block';
                showImg(0);
                await detectBoxesFrom(images[0].f);
            }
        };
        img.src = URL.createObjectURL(f);
    });
};

function showImg(idx) {
    cur = idx;
    const e = images[idx];
    canvas.width  = e.img.width;
    canvas.height = e.img.height;
    document.getElementById('nav-info').innerText = `${idx + 1} / ${images.length}`;
    draw();
}

// ── 切割 ──────────────────────────────────────────────
async function cutAll() {
    const btn = document.getElementById('cut-btn');
    btn.disabled = true; btn.innerText = '處理中...';

    const eboxes = effectiveBoxes();
    const eh     = effectiveH();

    for (let e of images) {
        const fd = new FormData();
        fd.append('strip', e.f);
        fd.append('y_top', Math.round(e.y));
        fd.append('boxes_x', JSON.stringify(eboxes));
        fd.append('fixed_height', eh);
        const res  = await fetch('/upload_strip', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.pieces) {
            data.pieces.forEach(p => { if (!allPieces.includes(p)) allPieces.push(p); });
        }
    }

    btn.disabled = false; btn.innerText = '開始切割並過濾';
    applyBankRatio();
    renderAll();
}

// ── 格位 ──────────────────────────────────────────────
function initGrid() {
    const r = parseInt(document.getElementById('rows').value);
    const c = parseInt(document.getElementById('cols').value);
    const n = r * c;
    if (cells.length > n) cells = cells.slice(0, n);
    else while (cells.length < n) cells.push(null);
    renderAll();
}

function renderAll() {
    const r = parseInt(document.getElementById('rows').value);
    const c = parseInt(document.getElementById('cols').value);
    const wrap = document.getElementById('grid-wrap');
    wrap.innerHTML = `<div class="grid-container" style="grid-template-columns:repeat(${c}, 80px)"></div>`;
    const container = wrap.firstChild;

    for (let i = 0; i < cells.length; i++) {
        const div = document.createElement('div');
        div.className    = 'cell';
        div.dataset.index = i;
        div.innerHTML = cells[i] ? `<img src="/image/${cells[i]}">` : '';
        div.onclick = () => { if (cells[i]) { cells.splice(i, 1); cells.push(null); renderAll(); } };
        div.ondragover  = (e) => e.preventDefault();
        div.ondrop      = (e) => { e.preventDefault(); addToCell(e.dataTransfer.getData('text'), i); };
        div.draggable   = true;
        div.ondragstart = (e) => { if (!cells[i]) return e.preventDefault(); dragSrc = { type: 'cell', idx: i }; e.dataTransfer.setData('text', cells[i]); };
        container.appendChild(div);
    }

    const bank = document.getElementById('bank');
    bank.innerHTML = '';
    [...allPieces].sort().reverse().forEach(fn => {
        const img = document.createElement('img');
        img.src       = `/image/${fn}`;
        img.className = cells.includes(fn) ? 'used' : '';
        img.onclick   = () => {
            if (cells.includes(fn)) return;
            const idx = cells.indexOf(null);
            if (idx !== -1) { cells[idx] = fn; renderAll(); }
        };
        img.draggable   = true;
        img.ondragstart = (e) => { dragSrc = { type: 'bank' }; e.dataTransfer.setData('text', fn); };
        bank.appendChild(img);
    });
}

function addToCell(fn, targetIdx) {
    const size = cells.length;
    if (dragSrc && dragSrc.type === 'bank') {
        cells.splice(targetIdx, 0, fn);
        cells = cells.slice(0, size);
    } else if (dragSrc && dragSrc.type === 'cell') {
        const item = cells.splice(dragSrc.idx, 1)[0];
        cells.splice(targetIdx, 0, item);
        if (cells.length < size) cells.push(null);
    }
    renderAll();
}

function autoFill() {
    const sorted    = [...allPieces].sort().reverse();
    const used      = cells.filter(c => c !== null);
    const available = sorted.filter(fn => !used.includes(fn));
    let ai = 0;
    for (let i = 0; i < cells.length; i++) {
        if (!cells[i] && ai < available.length) cells[i] = available[ai++];
    }
    renderAll();
}

// ── 生成 ──────────────────────────────────────────────
async function generate() {
    const btn = document.getElementById('generate-btn');
    btn.disabled = true; btn.innerText = '生成中...';
    const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            cover: coverFile, cells,
            grid_rows: document.getElementById('rows').value,
            grid_cols: document.getElementById('cols').value,
        })
    });
    const data = await res.json();
    btn.disabled = false; btn.innerText = '生成圖片';
    if (data.preview) {
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-img').src = 'data:image/jpeg;base64,' + data.preview;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
}

// ── 專案紀錄 ──────────────────────────────────────────
function exportProject() {
    const data = { coverFile, allPieces, cells, boxesX, fixedH,
        rows: document.getElementById('rows').value,
        cols: document.getElementById('cols').value };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `project_${Date.now()}.json`;
    a.click();
}

function importProject(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const data = JSON.parse(e.target.result);
        coverFile  = data.coverFile;
        allPieces  = data.allPieces;
        cells      = data.cells;
        if (data.boxesX) { boxesX = data.boxesX; document.getElementById('box-h').value = data.fixedH || fixedH; }
        document.getElementById('rows').value = data.rows;
        document.getElementById('cols').value = data.cols;
        applyBankRatio();
        renderAll();
    };
    reader.readAsText(input.files[0]);
}

function changeImg(s) { cur = (cur + s + images.length) % images.length; showImg(cur); }

initGrid();
</script>
</body>
</html>
