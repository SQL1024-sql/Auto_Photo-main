<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造型製圖工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root {
  --bg:           #0a0a0a;
  --surface:      #141414;
  --surface-2:    #1c1c1c;
  --surface-3:    #252525;
  --border:       rgba(255,255,255,0.07);
  --border-hi:    rgba(255,255,255,0.13);
  --accent:       #22d3ee;
  --accent-dim:   rgba(34,211,238,0.10);
  --accent-glow:  rgba(34,211,238,0.28);
  --success:      #4ade80;
  --success-dim:  rgba(74,222,128,0.10);
  --warning:      #fbbf24;
  --warning-dim:  rgba(251,191,36,0.10);
  --error:        #f87171;
  --purple:       #a78bfa;
  --purple-dim:   rgba(167,139,250,0.10);
  --text-1: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
  --cell-w: 84px; --cell-h: 154px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  font-size: 14px;
  min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.app-header {
  position: sticky; top: 0; z-index: 200;
  height: 56px;
  padding: 0 24px;
  display: flex; align-items: center; gap: 12px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.header-logo {
  width: 34px; height: 34px;
  background: var(--accent-dim);
  border: 1px solid rgba(34,211,238,0.22);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.header-logo svg { display: block; }
.brand  { font-size: 16px; font-weight: 700; color: var(--text-1); letter-spacing: 0.3px; }
.ver    { font-size: 10px; color: var(--text-3); background: var(--surface-3); border: 1px solid var(--border-hi); padding: 2px 9px; border-radius: 99px; }
.header-line {
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 5%, var(--accent) 40%, var(--purple) 60%, transparent 95%);
  opacity: 0.35;
}

/* ══════════════════════════════
   STEP BAR
══════════════════════════════ */
.steps-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 13px 24px;
  overflow-x: auto;
}
.steps { display: flex; align-items: center; min-width: max-content; }
.step  {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 500;
  color: var(--text-3);
  white-space: nowrap;
  transition: color 0.3s;
}
.step.active { color: var(--accent); }
.step.done   { color: var(--success); }
.step-num {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.step.active .step-num { background: var(--accent-dim); box-shadow: 0 0 10px var(--accent-glow); }
.step.done   .step-num { background: var(--success-dim); }
.step-connector {
  width: 36px; height: 1px;
  background: var(--border-hi);
  margin: 0 10px; flex-shrink: 0;
  transition: background 0.4s;
}
.step-connector.done { background: rgba(74,222,128,0.45); }

/* ══════════════════════════════
   PAGE & CARDS
══════════════════════════════ */
.page {
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  padding-bottom: 60px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  min-width: 0;
  transition: border-color 0.2s;
}
.card-header {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.ci {
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.ci-cyan   { background: var(--accent-dim);  color: var(--accent);  }
.ci-green  { background: var(--success-dim); color: var(--success); }
.ci-orange { background: var(--warning-dim); color: var(--warning); }
.ci-purple { background: var(--purple-dim);  color: var(--purple);  }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-1); }
.card-meta  { font-size: 11px; color: var(--text-3); margin-left: auto; }
.card-body  { padding: 16px 20px; }

.sub-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-3);
  margin-bottom: 10px;
  padding-left: 9px;
  border-left: 2px solid var(--accent);
}

.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.row:last-child { margin-bottom: 0; }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* ══════════════════════════════
   INPUTS
══════════════════════════════ */
input[type=number] {
  background: var(--surface-2);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-sm);
  color: var(--text-1);
  padding: 6px 10px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type=number]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}

/* ══════════════════════════════
   BUTTONS
══════════════════════════════ */
button {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 7px 14px;
  min-height: 44px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-hi);
  background: var(--surface-2);
  color: var(--text-2);
  cursor: pointer;
  transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.1s;
  outline: none;
  white-space: nowrap;
  user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
button:hover  { background: var(--surface-3); color: var(--text-1); }
button:active { transform: scale(0.96); }
button:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; }

.btn-primary {
  background: linear-gradient(135deg, #0891b2, #22d3ee);
  color: #040e12; border-color: transparent; font-weight: 700;
}
.btn-primary:hover { filter: brightness(1.08); box-shadow: 0 0 18px var(--accent-glow); border-color: transparent; color: #040e12; }

.btn-success  { background: rgba(74,222,128,0.07); color: var(--success); border-color: rgba(74,222,128,0.28); }
.btn-success:hover  { background: rgba(74,222,128,0.15); box-shadow: 0 0 12px rgba(74,222,128,0.2); color: var(--success); }

.btn-warning  { background: rgba(251,191,36,0.07); color: var(--warning); border-color: rgba(251,191,36,0.28); }
.btn-warning:hover  { background: rgba(251,191,36,0.14); color: var(--warning); }

.btn-purple   { background: rgba(167,139,250,0.07); color: var(--purple); border-color: rgba(167,139,250,0.28); }
.btn-purple:hover   { background: rgba(167,139,250,0.15); color: var(--purple); }

/* ══════════════════════════════
   UPLOAD ZONES
══════════════════════════════ */
.upload-zone {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; min-width: 180px;
  border: 1.5px dashed var(--border-hi);
  border-radius: var(--r-md);
  padding: 22px 16px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: center;
  background: var(--surface-2);
}
.upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
.upload-zone.done  { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.05); border-style: solid; }
.uz-icon svg { transition: opacity 0.2s; }
.upload-zone:hover .uz-icon svg { opacity: 1 !important; }
.uz-title { font-size: 13px; font-weight: 500; color: var(--text-2); }
.uz-sub   { font-size: 11px; color: var(--text-3); }
.upload-zone.done .uz-title { color: var(--success); }

/* ══════════════════════════════
   CANVAS
══════════════════════════════ */
#canvas-wrap {
  display: none;
  margin-top: 12px;
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1px solid var(--border);
  background: #000;
}
canvas {
  display: block; width: 100%; height: auto;
  cursor: ns-resize; touch-action: none;
  image-rendering: -webkit-optimize-contrast;
}

/* ══════════════════════════════
   BANK
══════════════════════════════ */
.bank-stats {
  display: flex; gap: 20px;
  font-size: 11px; color: var(--text-3);
  margin-left: auto;
}
.bank-stats span { color: var(--text-2); font-weight: 600; font-size: 13px; }

.bank {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 10px;
  max-height: 430px;
  overflow-y: auto;
}
.bank img {
  width: 100%; aspect-ratio: 302 / 552;
  object-fit: cover;
  cursor: grab;
  border: 1px solid transparent;
  border-radius: 4px;
  background: var(--surface-3);
  transition: transform 0.15s, border-color 0.15s, opacity 0.2s;
  user-select: none;
}
.bank img:hover { transform: scale(1.07); border-color: var(--accent); position: relative; z-index: 1; }
.bank img.used  { opacity: 0.2; filter: grayscale(70%); cursor: not-allowed; }
.bank img.used:hover { transform: none; border-color: transparent; }
.bank img { touch-action: none; }
.bank img.td-src { outline: 2px solid var(--accent); outline-offset: 2px; opacity: 0.55; }
.bank-empty { grid-column: 1/-1; text-align: center; padding: 36px; color: var(--text-3); font-size: 13px; }

@media (max-width: 1400px) { .bank { grid-template-columns: repeat(8, 1fr); } }
@media (max-width: 900px)  { .bank { grid-template-columns: repeat(5, 1fr); } }
@media (max-width: 600px)  { .bank { grid-template-columns: repeat(4, 1fr); } }

/* ══════════════════════════════
   GRID
══════════════════════════════ */
.grid-container {
  display: grid; gap: 6px; padding: 12px;
  width: fit-content;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.cell {
  width: var(--cell-w); height: var(--cell-h);
  background: var(--surface-3);
  border: 1.5px dashed var(--border-hi);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative; cursor: pointer;
  transition: border-color 0.18s, background 0.18s;
}
.cell:hover { border-color: rgba(248,113,113,0.5); background: rgba(248,113,113,0.05); }
.cell:empty::after { content: '+'; font-size: 22px; color: var(--text-3); }
.cell img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
.cell { touch-action: none; }
.cell.td-over { border-color: var(--accent) !important; background: var(--accent-dim) !important; border-style: solid !important; }

/* ══════════════════════════════
   RESULT
══════════════════════════════ */
#result-area { display: none; }
.result-img-wrap {
  display: inline-block;
  border-radius: var(--r-md);
  overflow: hidden;
  max-width: 100%;
  box-shadow: 0 0 60px rgba(34,211,238,0.10), 0 0 0 1px var(--border);
}
#result-img { display: block; max-width: 100%; }

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  border-radius: var(--r-md);
  font-size: 13px; font-weight: 500;
  z-index: 9999;
  border: 1px solid;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  transition: opacity 0.3s;
  max-width: 320px;
  pointer-events: none;
  word-break: break-word;
}
.toast-icon { font-size: 15px; flex-shrink: 0; }
.toast.ok   { background: #052e16; color: var(--success); border-color: rgba(74,222,128,0.3);  }
.toast.err  { background: #450a0a; color: var(--error);   border-color: rgba(248,113,113,0.3); }
.toast.info { background: #0c1a3a; color: #93c5fd;        border-color: rgba(147,197,253,0.3); }
.toast.warn { background: #2d1a00; color: var(--warning); border-color: rgba(251,191,36,0.3);  }

/* ══════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════ */
#grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }

label.upload-zone { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

@media (max-width: 640px) {
  :root { --cell-w: 62px; --cell-h: 114px; }

  .page { padding: 10px; gap: 8px; padding-bottom: 60px; }

  .app-header { padding: 0 12px; gap: 8px; }
  .brand { font-size: 14px; }

  .steps-wrap { padding: 10px 12px; }

  .card-header {
    padding: 10px 14px;
    flex-wrap: wrap;
    row-gap: 6px;
  }
  .card-meta { margin-left: 0; font-size: 10px; }
  .card-body  { padding: 12px 14px; }

  .bank-stats { gap: 10px; margin-left: auto; }

  .row { gap: 6px; }

  input[type=number] { font-size: 16px; min-height: 44px; }

  .upload-zone { padding: 16px 10px; min-width: 0; }
  .uz-title { font-size: 12px; }
  .uz-sub   { font-size: 10px; }

  .toast { bottom: 16px; right: 12px; left: 12px; max-width: none; }
}

@media (max-width: 420px) {
  :root { --cell-w: 54px; --cell-h: 99px; }

  .bank { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="app-header" style="position:relative;">
  <div class="header-logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
    </svg>
  </div>
  <span class="brand">造型製圖工具</span>
  <span class="ver">v2622</span>
  <div class="header-line"></div>
</header>

<!-- ══ STEP BAR ══ -->
<div class="steps-wrap">
  <div class="steps">
    <div class="step active" id="step-1"><div class="step-num">1</div>封面上傳</div>
    <div class="step-connector" id="line-1"></div>
    <div class="step" id="step-2"><div class="step-num">2</div>載入條圖</div>
    <div class="step-connector" id="line-2"></div>
    <div class="step" id="step-3"><div class="step-num">3</div>切割過濾</div>
    <div class="step-connector" id="line-3"></div>
    <div class="step" id="step-4"><div class="step-num">4</div>排版配置</div>
    <div class="step-connector" id="line-4"></div>
    <div class="step" id="step-5"><div class="step-num">5</div>輸出圖片</div>
  </div>
</div>

<!-- ══ PAGE ══ -->
<div class="page">

  <!-- Card 0 · 專案紀錄 -->
  <div class="card">
    <div class="card-header">
      <div class="ci ci-orange">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </div>
      <span class="card-title">專案紀錄</span>
      <span class="card-meta">匯入 / 匯出工作進度</span>
    </div>
    <div class="card-body">
      <div class="row">
        <button class="btn-warning" onclick="exportProject()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          匯出 .json
        </button>
        <button class="btn-warning" onclick="document.getElementById('import-input').click()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          匯入 .json
        </button>
        <input type="file" id="import-input" style="display:none" accept=".json" onchange="importProject(this)">
      </div>
    </div>
  </div>

  <!-- Card 1 · 封面 -->
  <div class="card">
    <div class="card-header">
      <div class="ci ci-purple">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <span class="card-title">封面圖片</span>
      <span class="card-meta">選填</span>
    </div>
    <div class="card-body">
      <label class="upload-zone" id="cover-zone" for="cover-input">
        <div class="uz-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span class="uz-title" id="cover-zone-title">點擊上傳封面圖片</span>
        <span class="uz-sub">支援 PNG · JPG · WEBP</span>
      </label>
      <input type="file" id="cover-input" style="display:none" accept="image/*" onchange="uploadCover(this)">
    </div>
  </div>

  <!-- Card 2 · 條圖切割 -->
  <div class="card">
    <div class="card-header">
      <div class="ci ci-cyan">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
      </div>
      <span class="card-title">載入條圖並切割</span>
      <span class="card-meta">支援觸控滑動調整</span>
    </div>
    <div class="card-body">

      <div class="row" style="align-items:stretch;">
        <label class="upload-zone" id="strip-zone" for="strip-input" style="flex:1; min-width:0;">
          <div class="uz-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </div>
          <span class="uz-title" id="strip-zone-title">點擊選取條圖（可多選）</span>
          <span class="uz-sub">支援 PNG · JPG · WEBP</span>
        </label>
        <input type="file" id="strip-input" multiple accept="image/*" style="display:none">
      </div>

      <div class="row" style="margin-top:8px;">
        <button onclick="changeImg(-1)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          上一張
        </button>
        <span id="nav-info" style="color:var(--text-3); font-size:12px; min-width:52px; text-align:center;">0 / 0</span>
        <button onclick="changeImg(1)">
          下一張
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="btn-success" id="cut-btn" onclick="cutAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
          開始切割並過濾
        </button>
      </div>

      <hr class="divider">

      <div class="sub-label">錨點自動定位</div>
      <div class="row">
        <span style="color:var(--text-3); font-size:12px;">Y 偏移</span>
        <input type="number" id="y-offset" value="-495" style="width:84px" title="錨點頂部 + 此值 = y_top，正數往下、負數往上">
        <button class="btn-primary" id="detect-btn" onclick="autoDetectY()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

        </button>
        <span id="detect-status" style="font-size:12px; color:var(--text-3);"></span>

  <!-- Card 3 · 資源庫 -->
  <div class="card">
    <div class="card-header">
      <div class="ci ci-cyan">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </div>

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>

        <span style="color:var(--text-3); font-size:12px;">列</span>

        <span style="color:var(--text-3); font-size:12px;">欄</span>
        <input type="number" id="cols" value="5" style="width:62px">
        <button onclick="initGrid()">重建表格</button>
        <button class="btn-purple" onclick="autoFill()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          自動填滿
        </button>
        <button class="btn-primary" id="generate-btn" onclick="generate()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>

          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

<!-- ══ SCRIPT ══ -->
<script>
let images = [], cur = 0, cells = [], allPieces = [], dragSrc = null, coverFile = null;
const FIXED_H = 565;
const BOXES_X = [[657, 965], [985, 1294], [1313, 1621], [1641, 1949], [1969, 2278]];
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');

// ── Toast ──
let _toastEl = null, _toastTimer = null;
const TOAST_ICONS = { ok: '✓', err: '✕', info: 'ℹ', warn: '⚠' };
function showToast(msg, type = 'info') {
    if (!_toastEl) { _toastEl = document.createElement('div'); document.body.appendChild(_toastEl); }
    _toastEl.className = `toast ${type}`;
    _toastEl.innerHTML = `<span class="toast-icon">${TOAST_ICONS[type]}</span><span>${msg}</span>`;
    _toastEl.style.opacity = '1';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { _toastEl.style.opacity = '0'; }, 3000);
}

// ── Steps ──
function setStepDone(n) {
    const el = document.getElementById(`step-${n}`);
    if (!el || el.classList.contains('done')) return;
    el.classList.remove('active');
    el.classList.add('done');
    el.querySelector('.step-num').innerText = '✓';
    const line = document.getElementById(`line-${n}`);
    if (line) line.classList.add('done');
    const next = document.getElementById(`step-${n + 1}`);
    if (next && !next.classList.contains('done')) next.classList.add('active');
}

// ── Canvas ──
function updateY(clientY) {
    if (!images[cur]) return;
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.height / rect.height;
    const ny = (clientY - rect.top) * scale - (FIXED_H / 2);
    images[cur].y = Math.max(0, Math.min(ny, images[cur].img.height - FIXED_H));
    draw();
}
canvas.onmousedown = e => {
    updateY(e.clientY);
    window.onmousemove = m => updateY(m.clientY);
    window.onmouseup  = () => window.onmousemove = null;
};
canvas.addEventListener('touchstart', e => { if (e.target === canvas) e.preventDefault(); updateY(e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove',  e => { if (e.target === canvas) e.preventDefault(); updateY(e.touches[0].clientY); }, { passive: false });

function draw() {
    const e = images[cur], yt = e.y, yb = yt + FIXED_H;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(e.img, 0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, yt);
    ctx.fillRect(0, yb, canvas.width, canvas.height - yb);
    ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 4;
    BOXES_X.forEach(b => ctx.strokeRect(b[0], yt, b[1] - b[0], FIXED_H));
    const label = `y_top = ${yt}`;
    ctx.font = 'bold 34px monospace';
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(8, 8, ctx.measureText(label).width + 16, 48);
    ctx.fillStyle = '#22d3ee';
    ctx.fillText(label, 16, 44);
}

// ── SVGs for reuse ──
const SVG_SCISSORS = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>`;
const SVG_SEARCH   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
const SVG_BOLT     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;

// ── Auto-detect Y ──
async function autoDetectY() {
    if (!images.length) { showToast('請先載入條圖', 'warn'); return; }
    const offset = parseInt(document.getElementById('y-offset').value) || 0;
    const btn = document.getElementById('detect-btn');
    const statusEl = document.getElementById('detect-status');
    btn.disabled = true; statusEl.innerText = '';
    let ok = 0, fail = 0;
    for (let i = 0; i < images.length; i++) {
        btn.innerHTML = `${SVG_SEARCH} 偵測中 ${i + 1} / ${images.length}...`;
        const fd = new FormData();
        fd.append('strip', images[i].f); fd.append('y_offset', offset);
        const data = await (await fetch('/detect_y', { method: 'POST', body: fd })).json();
        if (data.found) { images[i].y = data.y_top; ok++; } else { fail++; }
    }
    btn.disabled = false;
    btn.innerHTML = `${SVG_SEARCH} 自動定位全部`;
    statusEl.style.color = fail ? 'var(--warning)' : 'var(--success)';
    statusEl.innerText = `${ok} 成功 / ${fail} 失敗`;
    if (images[cur]) showImg(cur);
    fail === 0 ? showToast(`自動定位完成，共 ${ok} 張成功`, 'ok')
               : showToast(`定位完成：${ok} 成功，${fail} 張未找到錨點`, 'warn');
}

// ── Upload cover ──
async function uploadCover(input) {
    if (!input.files[0]) return;
    const fd = new FormData(); fd.append('cover', input.files[0]);
    const data = await (await fetch('/upload_cover', { method: 'POST', body: fd })).json();
    if (data.filename) {
        coverFile = data.filename;
        const zone = document.getElementById('cover-zone');
        zone.classList.add('done');
        document.getElementById('cover-zone-title').innerText = '✓ 已就緒：' + input.files[0].name;
        showToast('封面已上傳', 'ok');
        setStepDone(1);
    } else {
        showToast(data.error || '封面上傳失敗', 'err');
    }
}

// ── Strip input ──
document.getElementById('strip-input').onchange = function(e) {
    images = []; let loaded = 0;
    const files = Array.from(e.target.files);
    if (!files.length) return;
    files.forEach((f, i) => {
        const img = new Image();
        img.onload = () => {
            images[i] = { f, img, y: Math.round(img.height * 0.4) };
            if (++loaded === files.length) {
                document.getElementById('canvas-wrap').style.display = 'block';
                const zone = document.getElementById('strip-zone');
                zone.classList.add('done');
                document.getElementById('strip-zone-title').innerText = `✓ 已選取 ${files.length} 張條圖`;
                showImg(0);
                showToast(`已載入 ${files.length} 張條圖`, 'info');
                setStepDone(2);
            }
        };
        img.src = URL.createObjectURL(f);
    });
};

function showImg(idx) {
    cur = idx; const e = images[idx];
    canvas.width = e.img.width; canvas.height = e.img.height;
    document.getElementById('nav-info').innerText = `${idx + 1} / ${images.length}`;
    draw();
}

// ── Cut all ──
async function cutAll() {
    if (!images.length) { showToast('請先載入條圖', 'warn'); return; }
    const btn = document.getElementById('cut-btn');
    btn.disabled = true;
    let newCount = 0;
    for (let i = 0; i < images.length; i++) {
        btn.innerHTML = `${SVG_SCISSORS} 切割中 ${i + 1} / ${images.length}...`;
        const fd = new FormData();
        fd.append('strip', images[i].f); fd.append('y_top', Math.round(images[i].y));
        const data = await (await fetch('/upload_strip', { method: 'POST', body: fd })).json();
        if (data.pieces) data.pieces.forEach(p => { if (!allPieces.includes(p)) { allPieces.push(p); newCount++; } });
    }
    btn.disabled = false;
    btn.innerHTML = `${SVG_SCISSORS} 開始切割並過濾`;
    renderAll();
    showToast(`切割完成，新增 ${newCount} 個造型，共 ${allPieces.length} 個`, 'ok');
    setStepDone(3); setStepDone(4);
}

// ── Grid init ──
function initGrid() {
    const r = parseInt(document.getElementById('rows').value);
    const c = parseInt(document.getElementById('cols').value);
    const target = r * c;
    if (cells.length > target) cells = cells.slice(0, target);
    else while (cells.length < target) cells.push(null);
    renderAll();
}

// ── Render bank + grid ──
function renderAll() {
    const r = parseInt(document.getElementById('rows').value);
    const c = parseInt(document.getElementById('cols').value);

    const wrap = document.getElementById('grid-wrap');
    wrap.innerHTML = `<div class="grid-container" style="grid-template-columns:repeat(${c}, var(--cell-w))"></div>`;
    const container = wrap.firstChild;
    for (let i = 0; i < cells.length; i++) {
        const div = document.createElement('div');
        div.className = 'cell'; div.dataset.index = i;
        div.innerHTML = cells[i] ? `<img src="/image/${cells[i]}">` : '';
        div.onclick   = () => { if (cells[i]) { cells.splice(i, 1); cells.push(null); renderAll(); } };
        div.ondragover = ev => ev.preventDefault();
        div.ondrop     = ev => { ev.preventDefault(); addToCell(ev.dataTransfer.getData('text'), i); };
        div.draggable  = true;
        div.ondragstart = ev => { if (!cells[i]) return ev.preventDefault(); dragSrc = { type: 'cell', idx: i }; ev.dataTransfer.setData('text', cells[i]); };
        container.appendChild(div);
    }

    const usedCount = cells.filter(x => x !== null).length;
    document.getElementById('stat-total').innerText = allPieces.length;
    document.getElementById('stat-used').innerText  = usedCount;
    document.getElementById('stat-avail').innerText = allPieces.length - usedCount;

    const bank = document.getElementById('bank');
    bank.innerHTML = '';
    if (!allPieces.length) {
        bank.innerHTML = '<div class="bank-empty">尚無造型，請先完成切割步驟</div>';
        return;
    }
    [...allPieces].sort().reverse().forEach(fn => {
        const img = document.createElement('img');
        img.src = `/image/${fn}`;
        const isUsed = cells.includes(fn);
        img.className = isUsed ? 'used' : '';
        img.title = isUsed ? '已在排版中' : '點擊或拖曳加入排版';
        img.onclick = () => {
            if (isUsed) return;
            const emptyIdx = cells.indexOf(null);
            if (emptyIdx !== -1) { cells[emptyIdx] = fn; renderAll(); }
            else showToast('格位已滿，請增加列數或欄數', 'warn');
        };
        img.draggable = true;
        img.ondragstart = ev => { dragSrc = { type: 'bank' }; ev.dataTransfer.setData('text', fn); };
        bank.appendChild(img);
    });
}

function addToCell(fn, targetIdx) {
    const totalSize = cells.length;
    if (dragSrc?.type === 'bank') {
        cells.splice(targetIdx, 0, fn); cells = cells.slice(0, totalSize);
    } else if (dragSrc?.type === 'cell') {
        const item = cells.splice(dragSrc.idx, 1)[0];
        cells.splice(targetIdx, 0, item);
        if (cells.length < totalSize) cells.push(null);
    }
    renderAll();
}

function autoFill() {
    const available = [...allPieces].sort().reverse().filter(fn => !cells.includes(fn));
    let ai = 0;
    for (let i = 0; i < cells.length; i++) {
        if (!cells[i] && ai < available.length) cells[i] = available[ai++];
    }
    renderAll();
    showToast('已自動填入可用造型', 'info');
}

// ── Generate ──
async function generate() {
    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.innerHTML = `${SVG_BOLT} 生成中...`;
    showToast('正在生成圖片，請稍候...', 'info');
    const data = await (await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cover: coverFile, cells, grid_rows: document.getElementById('rows').value, grid_cols: document.getElementById('cols').value })
    })).json();
    btn.disabled = false;
    btn.innerHTML = `${SVG_BOLT} 生成圖片`;
    if (data.preview) {
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-img').src = 'data:image/jpeg;base64,' + data.preview;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        showToast('圖片生成完成！', 'ok');
        setStepDone(5);
    } else {
        showToast('生成失敗，請確認排版中有放入造型', 'err');
    }
}

// ── Project I/O ──
function exportProject() {
    const data = { coverFile, allPieces, cells, rows: document.getElementById('rows').value, cols: document.getElementById('cols').value };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
    a.download = `project_${Date.now()}.json`; a.click();
    showToast('專案紀錄已匯出', 'ok');
}

function importProject(input) {
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            coverFile = data.coverFile; allPieces = data.allPieces || []; cells = data.cells || [];
            document.getElementById('rows').value = data.rows;
            document.getElementById('cols').value = data.cols;
            renderAll(); showToast('專案紀錄已匯入', 'ok');
        } catch { showToast('匯入失敗，檔案格式錯誤', 'err'); }
    };
    reader.readAsText(input.files[0]);
}

function downloadResult() {
    const img = document.getElementById('result-img');
    if (!img.src || img.src === window.location.href) { showToast('尚無圖片可下載', 'warn'); return; }
    const a = document.createElement('a'); a.href = img.src;
    a.download = `result_${Date.now()}.jpg`; a.click();
}

function changeImg(s) { cur = (cur + s + images.length) % images.length; showImg(cur); }

// ── Touch Drag ──
(function () {
    let td = null;

    function mkGhost(src, w, h) {
        const g = document.createElement('img');
        g.src = src; g.draggable = false;
        Object.assign(g.style, {
            position: 'fixed', width: w + 'px', height: h + 'px',
            objectFit: 'cover', borderRadius: '4px',
            pointerEvents: 'none', zIndex: '9999',
            opacity: '0.9', transform: 'scale(1.12)',
            boxShadow: '0 10px 30px rgba(0,0,0,0.8)',
            border: '2px solid #22d3ee', transition: 'none'
        });
        document.body.appendChild(g);
        return g;
    }

    function posGhost(g, x, y) {
        g.style.left = (x - g.offsetWidth  / 2) + 'px';
        g.style.top  = (y - g.offsetHeight / 2) + 'px';
    }

    function cellAt(x, y) {
        const el = document.elementFromPoint(x, y);
        return el ? el.closest('.cell') : null;
    }

    function clearHL() {
        document.querySelectorAll('.cell.td-over').forEach(c => c.classList.remove('td-over'));
    }

    function cancel() {
        if (!td) return;
        clearTimeout(td.timer);
        if (td._bi) td._bi.classList.remove('td-src');
        if (td.g) td.g.remove();
        clearHL();
        td = null;
    }

    document.addEventListener('touchstart', e => {
        if (td) cancel();
        const t = e.touches[0];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (!el) return;

        const bi = el.closest('#bank img');
        if (bi && !bi.classList.contains('used')) {
            const fn = bi.getAttribute('src').replace('/image/', '');
            const timer = setTimeout(() => {
                if (!td || td._bi !== bi) return;
                td.ready = true;
                td.g = mkGhost('/image/' + fn, bi.offsetWidth, bi.offsetHeight);
                posGhost(td.g, td.sx, td.sy);
                bi.classList.add('td-src');
            }, 160);
            td = { type: 'bank', fn, sx: t.clientX, sy: t.clientY, moved: false, g: null, ready: false, timer, _bi: bi };
            return;
        }

        // Grid cell — long-press (200ms) to drag; horizontal swipe to scroll grid
        const cell = el.closest('.cell');
        if (cell) {
            const idx = parseInt(cell.dataset.index);
            if (!cells[idx]) return;
            const timer = setTimeout(() => {
                if (!td || td._ci !== cell) return;
                td.ready = true;
            }, 200);
            td = { type: 'cell', fn: cells[idx], idx, sx: t.clientX, sy: t.clientY, lastX: t.clientX, moved: false, g: null, ready: false, scrolling: false, timer, _bi: null, _ci: cell };
        }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
        if (!td) return;
        const t = e.touches[0];
        const dx = t.clientX - td.sx, dy = t.clientY - td.sy;
        const dist = Math.hypot(dx, dy);

        if (!td.ready) {
            if (td.scrolling) {
                const delta = td.lastX - t.clientX;
                document.getElementById('grid-wrap').scrollLeft += delta;
                td.lastX = t.clientX;
                e.preventDefault();
                return;
            }
            if (dist > 8) {
                if (td.type === 'cell' && Math.abs(dx) > Math.abs(dy)) {
                    td.scrolling = true;
                    clearTimeout(td.timer);
                    td.lastX = t.clientX;
                } else {
                    cancel();
                }
            }
            return;
        }

        if (!td.g) {
            // Cell drag: create ghost after movement threshold
            if (dist < 6) return;
            const cell = document.querySelector('.cell[data-index="' + td.idx + '"]');
            if (!cell) { cancel(); return; }
            td.g = mkGhost('/image/' + td.fn, cell.offsetWidth, cell.offsetHeight);
            posGhost(td.g, td.sx, td.sy);
        }

        td.moved = true;
        e.preventDefault();
        posGhost(td.g, t.clientX, t.clientY);
        clearHL();
        const c = cellAt(t.clientX, t.clientY);
        if (c) c.classList.add('td-over');
    }, { passive: false });

    document.addEventListener('touchend', e => {
        if (!td) return;
        clearTimeout(td.timer);
        if (td._bi) td._bi.classList.remove('td-src');
        if (td.scrolling) { td = null; return; }
        const ghost = td.g, moved = td.moved, snap = moved ? e.changedTouches[0] : null;
        const type = td.type, fn = td.fn, srcIdx = td.idx;
        clearHL();
        td = null;
        if (ghost) {
            ghost.style.transition = 'opacity 0.12s';
            ghost.style.opacity = '0';
            setTimeout(() => ghost.remove(), 120);
        }
        if (moved && snap) {
            const c = cellAt(snap.clientX, snap.clientY);
            if (c) {
                const ti = parseInt(c.dataset.index);
                dragSrc = type === 'bank' ? { type: 'bank' } : { type: 'cell', idx: srcIdx };
                addToCell(fn, ti);
            }
        }
    }, { passive: true });

    document.addEventListener('touchcancel', cancel, { passive: true });
})();

initGrid();
</script>
</body>
</html>
